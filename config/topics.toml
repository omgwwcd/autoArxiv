  "long-horizon",
  "grounding",
  "benchmark",
  "evaluation",
  "osworld",
  "agent",
  "automation",
  "workflow",
  "cli agent",
  "command-line agent",
  "terminal agent",
  "shell agent",
  "bash agent",
  "cli tool",
  "llm",
  "large language model",
  "multimodal",
  "vlm",
