[digest]
project_name = "GUI Agent Research Digest"
target_day_offset = 3
max_papers_per_run = 5
max_candidates = 80
language = "zh-CN"
timezone = "Asia/Shanghai"

[[topics]]
name = "GUI Agent"
categories = ["cs.AI", "cs.CL", "cs.LG", "cs.HCI", "cs.SE"]
include_keywords = [
  # GUI Agent 核心
  "gui agent",
  "graphical user interface agent",
  "web agent",
  "desktop agent",
  "ui agent",
  "gui understanding",
  "gui perception",
  "screen understanding",
  "interface agent",
  "automation agent",
  "autonomous gui",
  "gui grounding",
  "gui element",
  "widget understanding",
  "visual gui",
  "multimodal agent",
  "agent",
  # GUI 交互 & 操作
  "gui control",
  "gui manipulation",
  "click prediction",
  "element localization",
  "element detection",
  "referring expression",
  "screen parsing",
  "icon recognition",
  "text spotting",
  # GUI 导航 & 规划
  "task planning",
  "multi-step reasoning",
  "hierarchical planning",
  "goal decomposition",
  "automation",
  "workflow automation",
  "computer task",
  "digital assistant",
  "personal agent",
  # RL 相关
  "reinforcement learning",
  "rl",
  "policy optimization",
  "actor-critic",
  "q-learning",
  "offline rl",
  "online rl",
  "reward model",
  "reward shaping",
  "imitation learning",
  "behavior cloning",
  "decision making",
  "exploration strategy",
  "credit assignment",
  # LLM 相关
  "large language model",
  "llm",
  "language model",
  "multimodal llm",
  "vision-language model",
  "vlm",
  "gpt",
  "claude",
  "reasoning",
  "chain-of-thought",
  "instruction tuning",
  "alignment",
  "rag",
]
exclude_keywords = [
  "survey request for papers",
  "text-to-image generation",
  "image generation only",
  "speech synthesis",
  "pure computer vision without agent",
]
required_keyword_groups = [
  ["gui agent", "graphical user interface agent", "web agent", "desktop agent", "ui agent", "automation agent", "autonomous gui", "gui understanding", "gui perception"],
]
