[digest]
project_name = "GUI Agent Research Digest"
target_day_offset = 7
max_papers_per_run = 5
max_candidates = 120
language = "zh-CN"
timezone = "Asia/Shanghai"

# 优先级从高到低：系统按顺序匹配，第一个有命中的 topic 生效

[[topics]]
name = "GUI Agent"
categories = ["cs.AI", "cs.CL", "cs.LG", "cs.HCI", "cs.SE", "cs.CV"]
include_keywords = [
  "gui agent",
  "web agent",
  "desktop agent",
  "computer agent",
  "app agent",
  "mobile agent",
  "ui agent",
  "automation agent",
  "terminal agent",
  "agentic",
