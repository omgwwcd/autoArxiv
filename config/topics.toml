  "gui agent",
  "web agent",
  "desktop agent",
  "computer agent",
  "app agent",
  "mobile agent",
  "ui agent",
  "automation agent",
  "terminal agent",
  "digital agent",
  "autonomous gui",
  "gui grounding",
  "screen understanding",
  "gui understanding",
  "interface agent",
  "widget",
  "element grounding",
  # Agent 相关核心词
  "agent",
  "agents",
  "agentic",
  "multi-agent",
  # 操作 / 规划
  "task planning",
  "multi-step",
  "long-horizon",
  "automation",
  "workflow",
  "grounding",
  "element detection",
  "click prediction",
  # 评测 / Benchmark
  "benchmark",
  "evaluation",
  "environment",
  "osworld",
  "AndroidControl",
  "awwbot",
  # LLM / VLM / Multimodal
  "large language model",
  "llm",
  "multimodal",
  "vision-language",
  "vlm",
  "gpt-4",
  "claude",
