  "gui agent",
  "web agent",
  "desktop agent",
  "ui agent",
  "automation agent",
  "computer agent",
  "app agent",
  "mobile agent",
  "interface agent",
  "autonomous gui",
  "gui understanding",
  "screen understanding",
  "gui perception",
  "visual agent",
  "multimodal agent",
  "agent",
  # 操作 & 规划
  "gui control",
  "gui manipulation",
  "click",
  "element detection",
  "screen parsing",
  "task planning",
  "goal reasoning",
  "multi-step reasoning",
  "automation",
  "workflow automation",
  "digital assistant",
  # RL & LLM
  "reinforcement learning",
  "rl",
  "large language model",
  "llm",
  "multimodal llm",
  "vision language",
  "vlm",
  "gpt",
  "reasoning",
  "chain-of-thought",
  "instruction tuning",
  "alignment",
]
exclude_keywords = [
  "survey request for papers",
]
